

name: Build ZMK firmware
on:
  push:
    paths:
      - "config/**"
      - "boards/**"
      - "dts/**"
      - "west.yml"
      - "build.yaml"
  workflow_dispatch:

jobs:
  build:
    # 锁死Ubuntu系统版本，20.04是唯一完美兼容ZMK v0.3.0的LTS版本
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 完全复用你原有的编译目标，和build.yaml完全一致
          - board: nice_nano_v2
            shield: eyelash_sofle_central_dongle dongle_display
            snippet: studio-rpc-usb-uart
            cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
            artifact-name: eyelash_sofle_central_dongle_oled
          - board: nice_nano_v2
            shield: eyelash_sofle_peripheral_left nice_view
          - board: nice_nano_v2
            shield: eyelash_sofle_peripheral_right nice_view
          - board: nice_nano_v2
            shield: settings_reset

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
      
      # 锁死Python版本，3.10是兼容旧版West的最后稳定版本
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install ZMK dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build gperf ccache dfu-util device-tree-compiler wget python3-dev python3-pip python3-setuptools python3-tk python3-wheel xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev
      
      # 核心修复：锁死West版本到0.11.0，彻底解决KeyError: 'qualifiers'报错
      - name: Install west
        run: |
          pip3 install --user west==0.11.0
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Initialize ZMK workspace
        run: west init -l config
      
      - name: Update ZMK modules
        run: west update
      
      - name: Build ZMK firmware
        run: |
          EXTRA_CMAKE_ARGS="${{ matrix.cmake-args }}"
          if [ -n "${{ matrix.snippet }}" ]; then
            EXTRA_CMAKE_ARGS="$EXTRA_CMAKE_ARGS -DZMK_EXTRA_SNIPPETS=${{ matrix.snippet }}"
          fi
          west build -b ${{ matrix.board }} -- -DSHIELD="${{ matrix.shield }}" $EXTRA_CMAKE_ARGS
      
      - name: Archive firmware
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact-name || format('{0}-{1}-firmware', matrix.board, matrix.shield) }}
          path: build/zephyr/zmk.uf2
